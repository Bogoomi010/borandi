<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>차원 균열 랜덤 디펜스</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="title-scene" class="scene">
        <canvas id="title-bg"></canvas>
        <div id="title-content"></div>
      </div>
      <div id="game-scene" class="scene hidden">
        <div id="menubar"></div>
        <div id="topbar"></div>
        <div id="middle">
          <div id="left-panel"></div>
          <div id="board-wrap"><canvas id="board"></canvas></div>
          <div id="right-panel"></div>
        </div>
        <div id="actionbar">
          <div id="unit-detail"></div>
          <div id="action-controls"></div>
        </div>
      </div>
      <div id="toast-root"></div>
      <div id="modal-root"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
